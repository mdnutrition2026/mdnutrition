<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MD Nutrition · TPV</title>
<style>
:root {
  --bg: #0a0a0a; --bg-card: #141414; --bg-lift: #1c1c1c;
  --red: #DC2626; --red-dark: #991b1b;
  --white: #ffffff; --muted: #9ca3af; --border: rgba(255,255,255,0.08);
  --green: #22c55e; --r: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--white); font-family: system-ui, sans-serif; font-size: 14px; max-width: 480px; margin: 0 auto; min-height: 100vh; }

/* LOGIN */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.login-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; text-align: center; }
.login-box h1 { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
.login-box h1 span { color: var(--red); }
.login-box p { color: var(--muted); margin-bottom: 24px; font-size: 13px; }
.login-box input { width: 100%; padding: 12px 16px; background: var(--bg-lift); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-size: 14px; margin-bottom: 12px; }
.login-box input:focus { outline: none; border-color: var(--red); }
.btn-red { width: 100%; padding: 12px; background: var(--red); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }

/* APP */
#app { display: none; }

/* HEADER */
.tpv-header {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
}
.tpv-logo { font-weight: 900; font-size: 18px; }
.tpv-logo span { color: var(--red); }
.tpv-tabs { display: flex; gap: 2px; background: var(--bg-lift); border-radius: 8px; padding: 3px; }
.tpv-tab { padding: 6px 14px; border-radius: 6px; border: none; background: none; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; }
.tpv-tab.active { background: var(--red); color: #fff; }

/* VENTA */
#page-venta, #page-historial { padding: 16px; }

.search-wrap { position: relative; margin-bottom: 12px; }
.search-wrap input {
  width: 100%; padding: 12px 16px 12px 40px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 10px; color: var(--white); font-size: 15px;
}
.search-wrap input:focus { outline: none; border-color: var(--red); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.search-icon svg { width: 18px; height: 18px; }

/* RESULTADOS BÚSQUEDA */
#search-results {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden; margin-bottom: 16px; display: none;
}
.search-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); }
.search-item:last-child { border-bottom: none; }
.search-item:hover, .search-item:active { background: var(--bg-lift); }
.search-item-img { width: 36px; height: 36px; border-radius: 6px; object-fit: contain; background: var(--bg-lift); border: 1px solid var(--border); flex-shrink: 0; }
.search-item-info { flex: 1; min-width: 0; }
.search-item-name { font-size: 13px; font-weight: 600; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.search-item-brand { font-size: 11px; color: var(--muted); }
.search-item-price { font-size: 13px; font-weight: 700; color: var(--red); flex-shrink: 0; }

/* MODAL AÑADIR */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--bg-card); border-radius: 20px 20px 0 0; width: 100%;
  padding: 24px; border: 1px solid var(--border); border-bottom: none;
}
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 20px; }
.modal-prod-name { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
.modal-prod-brand { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.modal-select-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.modal-select {
  width: 100%; padding: 10px 12px; background: var(--bg-lift); border: 1px solid var(--border);
  border-radius: 8px; color: var(--white); font-size: 14px; margin-bottom: 14px;
  appearance: none;
}
.qty-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.qty-ctrl { display: flex; align-items: center; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.qty-btn { width: 44px; height: 44px; background: var(--bg-lift); border: none; color: var(--white); font-size: 20px; cursor: pointer; }
.qty-btn:active { background: var(--red); }
.qty-val { width: 50px; text-align: center; font-size: 18px; font-weight: 700; }
.price-preview { font-size: 20px; font-weight: 900; color: var(--red); }
.btn-add-to-cart { width: 100%; padding: 14px; background: var(--red); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-add-to-cart:active { background: var(--red-dark); }
.btn-cancel-modal { width: 100%; padding: 10px; background: none; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-size: 13px; cursor: pointer; margin-top: 8px; }

/* LÍNEAS DE VENTA */
.venta-section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.lineas-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.linea-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: flex; align-items: center; gap: 10px; }
.linea-img { width: 40px; height: 40px; border-radius: 6px; object-fit: contain; background: var(--bg-lift); flex-shrink: 0; }
.linea-info { flex: 1; min-width: 0; }
.linea-name { font-size: 13px; font-weight: 600; line-height: 1.2; }
.linea-meta { font-size: 11px; color: var(--muted); }
.linea-price { font-size: 14px; font-weight: 700; color: var(--red); flex-shrink: 0; }
.linea-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; }
.linea-del:active { color: var(--red); }

/* TOTAL Y COBRAR */
.venta-footer { position: sticky; bottom: 0; background: var(--bg); padding: 16px; border-top: 1px solid var(--border); }
.total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
.total-label { font-size: 13px; color: var(--muted); }
.total-val { font-size: 28px; font-weight: 900; }
.btn-cobrar { width: 100%; padding: 16px; background: var(--green); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; letter-spacing: .3px; }
.btn-cobrar:disabled { background: var(--bg-lift); color: var(--muted); cursor: default; }
.btn-vaciar { width: 100%; padding: 10px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer; margin-top: 8px; }

/* HISTORIAL */
.hist-resumen { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; text-align: center; }
.hist-stat-val { font-size: 22px; font-weight: 900; }
.hist-stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
.hist-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.hist-item-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
.hist-item-time { font-size: 12px; color: var(--muted); }
.hist-item-total { font-size: 16px; font-weight: 800; color: var(--red); }
.hist-item-detail { font-size: 12px; color: var(--muted); }

.empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
.empty-state svg { width: 48px; height: 48px; opacity: .3; margin-bottom: 12px; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>MD <span>TPV</span></h1>
    <p>Caja de tienda MD Nutrition</p>
    <input type="password" id="token-input" placeholder="Token de acceso" />
    <button class="btn-red" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="app">
  <div class="tpv-header">
    <div class="tpv-logo">MD <span>TPV</span></div>
    <div class="tpv-tabs">
      <button class="tpv-tab active" onclick="showTab('venta', this)">Venta</button>
      <button class="tpv-tab" onclick="showTab('historial', this)">Hoy</button>
    </div>
  </div>

  <!-- VENTA -->
  <div id="page-venta">
    <div class="search-wrap">
      <div class="search-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></div>
      <input type="text" id="prod-search" placeholder="Buscar producto..." oninput="onProdSearch(this.value)" autocomplete="off" />
    </div>
    <div id="search-results"></div>

    <div id="lineas-section" style="display:none">
      <div class="venta-section-title">Productos en esta venta</div>
      <div class="lineas-list" id="lineas-list"></div>
    </div>

    <div class="empty-state" id="empty-state">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      <p>Busca un producto para añadirlo a la venta</p>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div id="page-historial" style="display:none">
    <div id="hist-resumen" class="hist-resumen">
      <div><div class="hist-stat-val" id="hist-ventas">—</div><div class="hist-stat-label">Ventas</div></div>
      <div><div class="hist-stat-val" id="hist-unidades">—</div><div class="hist-stat-label">Unidades</div></div>
      <div><div class="hist-stat-val" id="hist-total">—</div><div class="hist-stat-label">Total</div></div>
    </div>
    <div id="hist-list"></div>
  </div>

  <!-- FOOTER VENTA -->
  <div class="venta-footer" id="venta-footer">
    <div class="total-row">
      <span class="total-label">Total</span>
      <span class="total-val" id="total-val">0,00€</span>
    </div>
    <button class="btn-cobrar" id="btn-cobrar" onclick="cobrar()" disabled>Registrar venta</button>
    <button class="btn-vaciar" onclick="vaciarVenta()">Vaciar</button>
  </div>
</div>

<!-- MODAL AÑADIR PRODUCTO -->
<div class="modal-overlay" id="add-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-prod-name" id="modal-prod-name">—</div>
    <div class="modal-prod-brand" id="modal-prod-brand">—</div>

    <div id="modal-variante-wrap">
      <div class="modal-select-label">Tamaño / Formato</div>
      <select class="modal-select" id="modal-variante" onchange="updateModalPrice()"></select>
    </div>

    <div id="modal-sabor-wrap">
      <div class="modal-select-label">Sabor</div>
      <select class="modal-select" id="modal-sabor"></select>
    </div>

    <div class="qty-row">
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <div class="qty-val" id="modal-qty">1</div>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
      <div class="price-preview" id="modal-price-preview">—</div>
    </div>

    <button class="btn-add-to-cart" onclick="addToVenta()">Añadir a la venta</button>
    <button class="btn-cancel-modal" onclick="closeAddModal()">Cancelar</button>
  </div>
</div>

<script>
const API = 'https://md-nutrition-api.diegosobrinohz.workers.dev';
let TOKEN = '';
let lineas = [];
let modalProd = null;
let modalQty = 1;
let searchTimer;

// ── AUTH ──────────────────────────────────────────
async function doLogin() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  const res = await fetch(`${API}/api/ventas/hoy`, { headers: { 'Authorization': `Bearer ${t}` } });
  if (res.ok) {
    TOKEN = t;
    localStorage.setItem('tpv_token', t);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    alert('Token incorrecto');
  }
}

// ── TABS ──────────────────────────────────────────
function showTab(name, btn) {
  document.getElementById('page-venta').style.display = name === 'venta' ? 'block' : 'none';
  document.getElementById('page-historial').style.display = name === 'historial' ? 'block' : 'none';
  document.getElementById('venta-footer').style.display = name === 'venta' ? 'block' : 'none';
  document.querySelectorAll('.tpv-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'historial') loadHistorial();
}

// ── BÚSQUEDA ──────────────────────────────────────
function onProdSearch(val) {
  clearTimeout(searchTimer);
  if (!val.trim()) { document.getElementById('search-results').style.display = 'none'; return; }
  searchTimer = setTimeout(() => searchProds(val), 300);
}

async function searchProds(q) {
  const res = await fetch(`${API}/api/catalogo?q=${encodeURIComponent(q)}&limit=8`);
  const data = await res.json();
  const el = document.getElementById('search-results');

  if (!data.productos || !data.productos.length) {
    el.style.display = 'block';
    el.innerHTML = '<div style="padding:16px;text-align:center;color:var(--muted)">Sin resultados</div>';
    return;
  }

  el.style.display = 'block';
  el.innerHTML = data.productos.map(p => {
    const price = p.variantes?.length ? p.variantes[0].price : (p.precio_base ? p.precio_base.toFixed(2).replace('.',',') + '€' : '—');
    return `<div class="search-item" onclick="openAddModal(${p.id})">
      ${p.imagen_url ? `<img class="search-item-img" src="${p.imagen_url}" onerror="this.style.display='none'">` : '<div class="search-item-img"></div>'}
      <div class="search-item-info">
        <div class="search-item-name">${p.nombre}</div>
        <div class="search-item-brand">${p.marca || ''}</div>
      </div>
      <div class="search-item-price">${price}</div>
    </div>`;
  }).join('');
}

// ── MODAL AÑADIR ──────────────────────────────────
async function openAddModal(id) {
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('prod-search').value = '';

  const res = await fetch(`${API}/api/catalogo/${id}`);
  const data = await res.json();
  modalProd = data.producto;
  modalQty = 1;
  document.getElementById('modal-qty').textContent = '1';

  document.getElementById('modal-prod-name').textContent = modalProd.nombre;
  document.getElementById('modal-prod-brand').textContent = modalProd.marca || '';

  // Variantes
  const varWrap = document.getElementById('modal-variante-wrap');
  const varSel = document.getElementById('modal-variante');
  if (modalProd.variantes?.length > 1) {
    varWrap.style.display = 'block';
    varSel.innerHTML = modalProd.variantes.map(v =>
      `<option value="${v.price}">${v.label} — ${v.price}</option>`
    ).join('');
  } else {
    varWrap.style.display = 'none';
  }

  // Sabores
  const sabWrap = document.getElementById('modal-sabor-wrap');
  const sabSel = document.getElementById('modal-sabor');
  if (modalProd.flavors?.length) {
    sabWrap.style.display = 'block';
    sabSel.innerHTML = modalProd.flavors.map(f => `<option>${f}</option>`).join('');
  } else {
    sabWrap.style.display = 'none';
  }

  updateModalPrice();
  document.getElementById('add-modal').classList.add('open');
}

function updateModalPrice() {
  if (!modalProd) return;
  let price = 0;
  const varSel = document.getElementById('modal-variante');
  if (modalProd.variantes?.length > 1 && varSel.value) {
    price = parseFloat(varSel.value.replace('€','').replace(',','.')) || 0;
  } else if (modalProd.precio_base) {
    price = modalProd.precio_base;
  }
  const total = price * modalQty;
  document.getElementById('modal-price-preview').textContent = total.toFixed(2).replace('.',',') + '€';
}

function changeQty(delta) {
  modalQty = Math.max(1, modalQty + delta);
  document.getElementById('modal-qty').textContent = modalQty;
  updateModalPrice();
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}

function addToVenta() {
  if (!modalProd) return;
  const varSel = document.getElementById('modal-variante');
  const sabSel = document.getElementById('modal-sabor');

  let varLabel = '', varPrice = modalProd.precio_base || 0;
  if (modalProd.variantes?.length > 1) {
    const opt = varSel.options[varSel.selectedIndex];
    varLabel = opt.text.split(' — ')[0];
    varPrice = parseFloat(varSel.value.replace('€','').replace(',','.')) || 0;
  } else if (modalProd.variantes?.length === 1) {
    varLabel = modalProd.variantes[0].label;
    varPrice = parseFloat(modalProd.variantes[0].price.replace('€','').replace(',','.')) || 0;
  }

  const sabor = modalProd.flavors?.length ? sabSel.value : '';

  lineas.push({
    producto_id: modalProd.id,
    nombre: modalProd.nombre,
    marca: modalProd.marca,
    img: modalProd.imagen_url,
    variante: varLabel,
    variante_id: null,
    sabor,
    sabor_id: null,
    precio: varPrice,
    cantidad: modalQty,
  });

  closeAddModal();
  renderLineas();
}

// ── LINEAS ────────────────────────────────────────
function renderLineas() {
  const list = document.getElementById('lineas-list');
  const section = document.getElementById('lineas-section');
  const empty = document.getElementById('empty-state');
  const cobrar = document.getElementById('btn-cobrar');

  if (!lineas.length) {
    section.style.display = 'none';
    empty.style.display = 'block';
    cobrar.disabled = true;
    document.getElementById('total-val').textContent = '0,00€';
    return;
  }

  section.style.display = 'block';
  empty.style.display = 'none';
  cobrar.disabled = false;

  list.innerHTML = lineas.map((l, i) => {
    const subtotal = (l.precio * l.cantidad).toFixed(2).replace('.',',');
    const meta = [l.marca, l.variante, l.sabor].filter(Boolean).join(' · ');
    return `<div class="linea-item">
      ${l.img ? `<img class="linea-img" src="${l.img}" onerror="this.style.display='none'">` : '<div class="linea-img"></div>'}
      <div class="linea-info">
        <div class="linea-name">${l.nombre}</div>
        ${meta ? `<div class="linea-meta">${meta} × ${l.cantidad}</div>` : ''}
      </div>
      <div class="linea-price">${subtotal}€</div>
      <button class="linea-del" onclick="removeLinea(${i})">×</button>
    </div>`;
  }).join('');

  const total = lineas.reduce((s, l) => s + l.precio * l.cantidad, 0);
  document.getElementById('total-val').textContent = total.toFixed(2).replace('.',',') + '€';
}

function removeLinea(i) {
  lineas.splice(i, 1);
  renderLineas();
}

function vaciarVenta() {
  if (lineas.length && !confirm('¿Vaciar la venta actual?')) return;
  lineas = [];
  renderLineas();
}

// ── COBRAR ────────────────────────────────────────
async function cobrar() {
  if (!lineas.length) return;
  const btn = document.getElementById('btn-cobrar');
  btn.disabled = true;
  btn.textContent = 'Registrando...';

  const payload = {
    canal: 'tienda',
    lineas: lineas.map(l => ({
      producto_id: l.producto_id,
      variante_id: l.variante_id,
      sabor_id: l.sabor_id,
      nombre: l.nombre + (l.variante ? ` (${l.variante})` : '') + (l.sabor ? ` — ${l.sabor}` : ''),
      precio: l.precio,
      cantidad: l.cantidad,
    }))
  };

  try {
    const res = await fetch(`${API}/api/ventas`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.ok) {
      const total = lineas.reduce((s, l) => s + l.precio * l.cantidad, 0);
      lineas = [];
      renderLineas();
      btn.textContent = '✓ Venta registrada';
      btn.style.background = 'var(--green)';
      setTimeout(() => {
        btn.textContent = 'Registrar venta';
        btn.style.background = '';
        btn.disabled = true;
      }, 2500);
    }
  } catch {
    btn.textContent = 'Error — reintentar';
    btn.disabled = false;
  }
}

// ── HISTORIAL ─────────────────────────────────────
async function loadHistorial() {
  const res = await fetch(`${API}/api/ventas/hoy`, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
  const data = await res.json();
  if (!data.ok) return;

  const r = data.resumen;
  document.getElementById('hist-ventas').textContent = r?.num_ventas || 0;
  document.getElementById('hist-unidades').textContent = r?.unidades_vendidas || 0;
  document.getElementById('hist-total').textContent = r?.total_dia ? (r.total_dia.toFixed(2).replace('.',',') + '€') : '0,00€';

  const list = document.getElementById('hist-list');
  if (!data.ventas?.length) {
    list.innerHTML = '<div class="empty-state"><p>Sin ventas registradas hoy</p></div>';
    return;
  }

  list.innerHTML = data.ventas.map(v => {
    const hora = new Date(v.creado_en).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    return `<div class="hist-item">
      <div class="hist-item-header">
        <span class="hist-item-time">${hora}</span>
        <span class="hist-item-total">${v.total.toFixed(2).replace('.',',')}€</span>
      </div>
      <div class="hist-item-detail">${v.num_lineas} producto${v.num_lineas > 1 ? 's' : ''} · ${v.unidades} unidad${v.unidades > 1 ? 'es' : ''}</div>
    </div>`;
  }).join('');
}

// ── INIT ──────────────────────────────────────────
const saved = localStorage.getItem('tpv_token');
if (saved) {
  document.getElementById('token-input').value = saved;
  doLogin();
}
document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('add-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAddModal(); });
</script>
</body>
